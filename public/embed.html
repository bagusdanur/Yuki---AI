<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuki</title>
  <style>
    :root{--bg:#0a0e16;--bg2:#0e131e;--accent1:#22d3ee;--accent2:#38bdf8;--card:#121826;--line:#232b3a;--ink:#e7ebf3;--muted:#8b94a8;--bot:#161d2b}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;color:var(--ink);background:var(--bg);display:flex;flex-direction:column}
    .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--bg2)}
    .ava{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#06121a;background:linear-gradient(135deg,var(--accent1),var(--accent2))}
    .top h1{margin:0;font-size:15px}
    .top p{margin:1px 0 0;font-size:11px;color:var(--muted)}
    .mood{margin-left:auto;font-size:11px;color:#cdd5e6;background:#1a2233;padding:5px 10px;border-radius:999px;border:1px solid var(--line)}
    .chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:8px;max-width:88%}
    .row.bot{align-self:flex-start}
    .row.user{align-self:flex-end;flex-direction:row-reverse}
    .b{padding:9px 13px;border-radius:14px;line-height:1.45;font-size:14px}
    .bot .b{background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
    .user .b{color:#06121a;font-weight:500;border-bottom-right-radius:4px;background:linear-gradient(135deg,var(--accent1),var(--accent2))}
    .b a{color:var(--accent1);font-weight:600;text-decoration:none}
    .user .b a{color:#06121a;text-decoration:underline}
    .b .act{font-style:italic;color:var(--muted)}
    .bar{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);background:var(--bg2)}
    .bar input{flex:1;padding:10px 14px;border:1px solid var(--line);outline:none;border-radius:999px;background:#0e1422;color:var(--ink);font-size:14px}
    .bar input:focus{border-color:var(--accent1)}
    .bar button{width:42px;border:none;border-radius:50%;cursor:pointer;color:#06121a;font-size:16px;background:linear-gradient(135deg,var(--accent1),var(--accent2))}
    .typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#5b6678;margin-right:3px;animation:bl 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
    @keyframes bl{0%,60%,100%{opacity:.25}30%{opacity:1}}
  </style>
</head>
<body>
  <div class="top">
    <div class="ava">Y</div>
    <div><h1>Yuki</h1><p>Asisten baca komik · Ryukomik</p></div>
    <div class="mood" id="mood">tenang</div>
  </div>
  <div class="chat" id="chat"></div>
  <form class="bar" id="form">
    <input id="input" placeholder="Tanya Yuki soal komik..." autocomplete="off" />
    <button type="submit">➔</button>
  </form>
  <script>
    // alamat server Node (kalau di-embed lintas origin, dioper lewat ?api=)
    const API = new URLSearchParams(location.search).get('api') || ''
    const chat = document.getElementById('chat')
    const form = document.getElementById('form')
    const input = document.getElementById('input')
    const moodEl = document.getElementById('mood')
    const history = []
    function getUserId(){
      let id = localStorage.getItem('yuki_uid')
      if (!id) { id = 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); localStorage.setItem('yuki_uid', id) }
      return id
    }
    function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
    function fmt(t){
      let h = esc(t); const L = []
      const st = (a) => { L.push(a); return '@@' + (L.length - 1) + '@@' }
      h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (m,a,u) => st('<a href="'+u+'" target="_blank" rel="noopener">'+a+'</a>'))
      h = h.replace(/(https?:\/\/[^\s<]+)/g, (m,u) => st('<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>'))
      h = h.replace(/\b(ryukomik\.my\.id)\b/gi, (m) => st('<a href="https://ryukomik.my.id" target="_blank" rel="noopener">'+m+'</a>'))
      h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      h = h.replace(/\*([^*]+)\*/g, '<span class="act">$1</span>')
      h = h.replace(/@@(\d+)@@/g, (m,i) => L[+i])
      h = h.replace(/\n/g, '<br>')
      return h
    }
    function add(t, who){
      const r = document.createElement('div'); r.className = 'row ' + who
      const b = document.createElement('div'); b.className = 'b'
      if (who === 'bot') b.innerHTML = fmt(t); else b.textContent = t
      if (who === 'bot') {
        const a = document.createElement('div'); a.className = 'ava'
        a.style.cssText = 'width:28px;height:28px;font-size:12px'; a.textContent = 'Y'
        r.append(a, b)
      } else r.append(b)
      chat.appendChild(r); chat.scrollTop = chat.scrollHeight; return r
    }
    function typing(){
      const r = document.createElement('div'); r.className = 'row bot'
      r.innerHTML = '<div class="ava" style="width:28px;height:28px;font-size:12px">Y</div><div class="b"><span class="typing"><span></span><span></span><span></span></span></div>'
      chat.appendChild(r); chat.scrollTop = chat.scrollHeight; return r
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault(); const t = input.value.trim(); if (!t) return
      add(t, 'user'); history.push({ role: 'user', content: t }); input.value = ''
      const ty = typing()
      try {
        const res = await fetch(API + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history, userId: getUserId() })
        })
        const d = await res.json(); ty.remove()
        const reply = d.reply || '(...)'
        if (d.mood) moodEl.textContent = d.bond ? d.mood + ' · ' + d.bond : d.mood
        add(reply, 'bot'); history.push({ role: 'assistant', content: reply })
      } catch (err) { ty.remove(); add('Error: ' + err.message, 'bot') }
    })
    add('...ada perlu apa? Mau cari komik?', 'bot')
  </script>
</body>
</html>
